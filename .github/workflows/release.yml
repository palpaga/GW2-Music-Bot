name: Build and Release

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build & Publish Single Exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Single File
        run: dotnet publish Gw2MusicBot.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_final

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gw2MusicBot-win-x64
          path: ./publish_final/Gw2MusicBot.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Gw2MusicBot-win-x64
          path: ./release_assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release_assets/Gw2MusicBot.exe
          generate_release_notes: true
